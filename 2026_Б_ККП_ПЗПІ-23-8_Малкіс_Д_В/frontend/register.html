<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - Fleet Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #3498db; }
        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #219a52; }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .links { text-align: center; margin-top: 20px; }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #e74c3c;
        }
        .success-message {
            background: #dfd;
            color: #383;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #27ae60;
        }
        .info-message {
            background: #e3f2fd;
            color: #1976d2;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #2196f3;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>Реєстрація</h1>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        <div id="infoMessage" class="info-message"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Ім'я:</label>
                <input type="text" id="name" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Пароль:</label>
                <input type="password" id="password" required autocomplete="new-password">
                <small style="color: #7f8c8d; font-size: 12px; display: block; margin-top: 5px;">
                    Мінімум 4 символи
                </small>
            </div>
            
            <button type="submit" id="registerBtn">Зареєструватися</button>
        </form>
        
        <div class="links">
            <a href="login.html">Вже є акаунт? Увійти</a>
        </div>
    </div>

    <script>
        const SERVER_URL = 'http://localhost:4001';
        
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            window.location.href = 'dashboard.html';
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const infoDiv = document.getElementById('infoMessage');
            const registerBtn = document.getElementById('registerBtn');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            infoDiv.style.display = 'none';
            
            if (!name) {
                errorDiv.textContent = 'Будь ласка, введіть ім\'я';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!email) {
                errorDiv.textContent = 'Будь ласка, введіть email';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!email.includes('@')) {
                errorDiv.textContent = 'Будь ласка, введіть коректний email (має містити @)';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!password) {
                errorDiv.textContent = 'Будь ласка, введіть пароль';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 4) {
                errorDiv.textContent = 'Пароль повинен містити мінімум 4 символи';
                errorDiv.style.display = 'block';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = 'Реєстрація...';
            infoDiv.textContent = 'Відправка даних на сервер...';
            infoDiv.style.display = 'block';
            
            try {
                const response = await fetch(`${SERVER_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                console.log('Відповідь сервера:', data);
                
                if (response.ok && data.success) {
                    infoDiv.style.display = 'none';
                    successDiv.textContent = '✅ Реєстрація успішна! Перенаправлення на сторінку входу...';
                    successDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    infoDiv.style.display = 'none';
                    errorDiv.textContent = data.error || 'Помилка реєстрації. Спробуйте інший email.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Помилка:', error);
                infoDiv.style.display = 'none';
                errorDiv.textContent = 'Помилка з\'єднання з сервером. Переконайтеся, що сервер запущений.';
                errorDiv.style.display = 'block';
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зареєструватися';
            }
        });
        
        document.getElementById('email').addEventListener('input', function(e) {
            const email = e.target.value;
            const errorDiv = document.getElementById('errorMessage');
            if (email && !email.includes('@')) {
                errorDiv.textContent = 'Email має містити символ @';
                errorDiv.style.display = 'block';
            } else if (errorDiv.style.display === 'block' && errorDiv.textContent.includes('@')) {
                errorDiv.style.display = 'none';
            }
        });
        
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const errorDiv = document.getElementById('errorMessage');
            if (password && password.length < 4 && password.length > 0) {
                errorDiv.textContent = 'Пароль повинен містити мінімум 4 символи';
                errorDiv.style.display = 'block';
            } else if (errorDiv.style.display === 'block' && errorDiv.textContent.includes('4 символи')) {
                errorDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
